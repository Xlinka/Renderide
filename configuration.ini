; ============================================================
; Renderide configuration
; Place this file next to the renderide executable, or in the
; working directory when launching via `cargo run`.
; ============================================================

[display]
; Enable vertical synchronization (true / false).
; When true the GPU waits for the display's vsync signal before
; presenting each frame.  Eliminates tearing but may cap FPS.
vsync = false

; Maximum frames per second while the window is focused.
; 0 = uncapped (runs as fast as the GPU allows).
focused_fps = 240

; Maximum frames per second while the window is unfocused / tabbed out.
; 0 = uncapped.  Set lower than focused_fps to save power/CPU when alt-tabbed.
unfocused_fps = 60

[rendering]
; Enable Ray-Traced Ambient Occlusion (requires a ray-tracing capable GPU).
; Set to false to disable RTAO globally regardless of GPU capability.
rtao_enabled = true

; RTAO darkening strength.  0.0 = no effect, 1.0 = full darkening.
rtao_strength = 1.0

; RTAO ray max distance in world units.  Shorter = tighter contact shadows.
ao_radius = 1.0

; CPU-side frustum culling.  Skips draws whose bounding box is outside the
; view frustum before uploading them to the GPU.  Almost always a win.
frustum_culling = true

[hud]
; Show the in-process debug HUD overlay (frame timings, draw stats, etc.).
; Set to false to hide it entirely (no GPU overhead from HUD rendering).
show_hud = true

; ============================================================
; Renderide configuration
; Place this file next to the renderide executable, or in the
; working directory when launching via `cargo run`.

; Comment out any setting to use the default value.
; ============================================================

[display]
; Enable vertical synchronization (true / false).
; When true the GPU waits for the display's vsync signal before
; presenting each frame.  Eliminates tearing but may cap FPS.
vsync = true

; Maximum frames per second while the window is focused.
; 0 = uncapped (runs as fast as the GPU allows).
focused_fps = 240

; Maximum frames per second while the window is unfocused / tabbed out.
; 0 = uncapped.  Set lower than focused_fps to save power/CPU when alt-tabbed.
unfocused_fps = 60

[camera]
; Near / far clip planes and desktop FOV (degrees).
; When the game host is connected, these are overwritten every frame from
; the host — INI values apply until the first frame (or headless / offline use).
near_clip = 0.01
far_clip = 1024.0
desktop_fov = 75.0

[rendering]
; When false, the GPU device is created without ray query / acceleration-structure APIs.
; Use this if your driver or stack crashes when ray tracing is initialized (RTAO and
; ray-traced PBR shadows stay off regardless of other toggles).
ray_tracing_enabled = false

; Enable Ray-Traced Ambient Occlusion (requires a ray-tracing capable GPU).
; Set to false to disable RTAO globally regardless of GPU capability.
rtao_enabled = false

; PBR ray-traced shadows via fragment ray queries and the scene TLAS (requires a
; ray-tracing capable GPU).  Independent of RTAO; default off (opt-in).
ray_traced_shadows_enabled = false

; When true with RTAO MRT, RtShadowComputePass fills a half-res atlas after the
; mesh pass; PBR samples it (one-frame latency). Requires rtao_enabled.
ray_traced_shadows_use_compute = false

; Soft shadow ray count for RT PBR (1–16). Default 8.
rt_soft_shadow_samples = 8

; Scales the soft-shadow cone width in RT PBR. Default 1.0.
rt_soft_shadow_cone_scale = 1.0

; When true, the shadow atlas is half the viewport resolution (fewer compute threads).
rt_shadow_atlas_half_resolution = true

; RTAO darkening strength.  0.0 = no effect, 1.0 = full darkening.
rtao_strength = 1.0

; RTAO ray max distance in world units.  Shorter = tighter contact shadows.
ao_radius = 1.0

; CPU-side frustum culling.  Skips draws whose bounding box is outside the
; view frustum before uploading them to the GPU.  Almost always a win.
frustum_culling = true

; UV debug pipeline for meshes with UVs (false = normal materials).
use_debug_uv = false

; Main scene uses PBR when true; NormalDebug-style when false.
use_pbr = true

; Apply drawable model_matrix to skinned MVP (Unity-style mesh root space).
skinned_apply_mesh_root_transform = true

; Use root_bone_transform_id for root-relative bone matrices (A/B alignment).
skinned_use_root_bone = false

; Force the DirectX 12 backend instead of Vulkan (intended for Windows). Disables ray tracing.
; Default false. Takes precedence over use_opengl if both are set.
use_dx12 = false

; Force the OpenGL (GLES) backend instead of Vulkan. Disables ray tracing.
; Useful for debugging or running on systems where Vulkan isn't available.
; Default false.
use_opengl = false

; Request wgpu validation layers (very slow). Ignored after GPU device is created.
gpu_validation_layers = false

; Log diagnostics for the first skinned draw each frame.
debug_skinned = false

; Log blendshape batch / weight preview each frame.
debug_blendshapes = false

; Extra Z flip on skinned MVP for handedness when skinned vs rigid disagree.
skinned_flip_handedness = false

; Reserved: parallel per-batch mesh-draw prep (see RenderConfig docs).
parallel_mesh_draw_prep_batches = true

; Trace-level per-phase timings in collect_draw_batches.
log_collect_draw_batches_timing = false

; --- Native UI (Strangler Fig: UI_Unlit / UI_TextUnlit) + coexistence with PBR fallback ----------
; Native WGSL UI is on by default in code; INI can force world-space UI, stencil pipelines, or tracing.
; use_native_ui_wgsl = true
; native_ui_world_space = false
; native_ui_overlay_stencil_pipelines = false
; log_native_ui_routing = false
; Per-frame counters for native routing vs skips vs PBR UI-vert fallback (shown on debug HUD when on).
; native_ui_routing_metrics = false
; When native UI routing misses, optionally send UV0 UI meshes through generic PBR (untextured stock shader).
; native_ui_uivert_pbr_fallback = false

; When true, non-skinned PBR reads host _Color / _Metallic / _Glossiness from MaterialPropertyStore (after id mapping).
; pbr_bind_host_material_properties = true

[hud]
; Show the in-process debug HUD overlay (frame timings, draw stats, etc.).
; Set to false to hide it entirely (no GPU overhead from HUD rendering).
show_hud = true

# Use the mold linker on Linux for faster link times.
# mold is Linux-only; macOS and Windows use their platform defaults.
# Requires `mold` and `clang` to be installed (e.g. `pacman -S mold clang`).

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[package]
name = "renderide"
version = "0.1.0"
edition = "2021"

[lib]
name = "renderide"
path = "src/lib.rs"

[build-dependencies]
naga = { version = "29", features = ["wgsl-in", "wgsl-out", "termcolor"] }
naga_oil = { version = "0.22", default-features = false }

[[bin]]
name = "renderide"
path = "src/main.rs"

[[bin]]
name = "roundtrip"
path = "src/bin/roundtrip.rs"

[features]
default = ["debug-hud"]
debug-hud = ["dep:imgui", "dep:imgui-wgpu", "dep:sysinfo"]

[dependencies]
bytemuck = { version = "1.25.0", features = ["derive"] }
glam = { version = "0.32.1", features = ["bytemuck"] }
memmap2 = "0.9"
interprocess = { path = "../interprocess" }
logger = { path = "../logger" }
pollster = "0.4"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
figment = { version = "0.10", features = ["toml", "env"] }
notify-debouncer-mini = "0.4"
notify = "6"
naga = { version = "29", features = ["wgsl-in", "wgsl-out", "termcolor"] }
unity-asset = "0.2.0"
wgpu = "29.0.1"
winit = "0.30"
ash = "0.38"
openxr = { version = "0.21", default-features = false, features = ["loaded"] }
imgui = { version = "0.12", optional = true, features = ["tables-api"] }
imgui-wgpu = { version = "0.28", optional = true }
sysinfo = { version = "0.38.4", default-features = false, features = ["system"], optional = true }

[dev-dependencies]
nalgebra = { version = "0.34.1", features = ["convert-bytemuck"] }
tempfile = "3"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61.2", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Console",
    "Win32_System_Memory",
    "Win32_System_Pipes",
] }
